name: Update bot + deploy dashboard

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_odds:
        description: "Re-ingest tennis-data.co.uk closing odds for all years (one-shot, ignores year-skip)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: pip install -e .

      - name: Restore DB cache
        id: restore-db
        uses: actions/cache/restore@v4
        with:
          path: data/breakpoint.db
          key: bot-db-${{ github.run_id }}
          restore-keys: bot-db-

      - name: Ingest historical data
        run: |
          breakpoint init-db
          breakpoint ingest --start-year 2015

      - name: Ingest closing odds (tennis-data.co.uk)
        run: |
          if [ "${{ github.event.inputs.refresh_odds }}" = "true" ]; then
            breakpoint ingest-historical-odds --start-year 2015 --refresh
          else
            breakpoint ingest-historical-odds --start-year 2015
          fi
        continue-on-error: true

      - name: Recompute Elo
        run: breakpoint elo

      - name: Train model
        run: breakpoint train --min-year 2015

      - name: Calibration audit (test split)
        run: breakpoint audit
        continue-on-error: true

      - name: Market vs model audit
        run: breakpoint audit-market
        continue-on-error: true

      - name: Training-data label stats (diagnostic)
        run: breakpoint train-stats
        continue-on-error: true

      - name: Sync fixtures + odds (The Odds API)
        env:
          BREAKPOINT_ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: breakpoint sync
        continue-on-error: true

      - name: Predict + place fake bets
        run: breakpoint predict
        continue-on-error: true

      - name: Void duplicate bets
        run: breakpoint void-duplicates
        continue-on-error: true

      - name: Settle open bets
        env:
          BREAKPOINT_ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: breakpoint settle

      - name: Export JSON for dashboard
        run: breakpoint export

      - name: Save DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/breakpoint.db
          key: bot-db-${{ github.run_id }}

      - name: Commit dashboard data
        id: commit
        run: |
          set -e
          git config user.name "breakpoint-bot"
          git config user.email "bot@users.noreply.github.com"

          commit_data() {
            git add dashboard/public/data
            if git diff --cached --quiet; then return 1; fi
            git commit -m "data: scheduled update $(date -u +%Y-%m-%dT%H:%MZ)"
          }

          if ! commit_data; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Push, regenerating JSON over latest remote on every conflict.
          # Data files are 100% generated from data/breakpoint.db so a pull
          # followed by `breakpoint export` always produces the freshest copy
          # without any merge work.
          for i in 1 2 3; do
            if git push origin main; then
              echo "changed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "push attempt $i failed, regenerating over origin/main"
            git reset --hard HEAD~1
            git fetch origin main
            git reset --hard origin/main
            breakpoint export
            commit_data || { echo "no diff after regenerate, done"; echo "changed=false" >> $GITHUB_OUTPUT; exit 0; }
            sleep 3
          done

          echo "all push attempts exhausted"
          echo "changed=false" >> $GITHUB_OUTPUT
          exit 1

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install + build dashboard
        working-directory: dashboard
        run: |
          npm ci || npm install
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist
      - id: deployment
        uses: actions/deploy-pages@v4

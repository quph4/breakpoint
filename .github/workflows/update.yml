name: Update bot + deploy dashboard

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: pip install -e .

      - name: Cache DB between runs
        uses: actions/cache@v4
        with:
          path: data/breakpoint.db
          key: bot-db-${{ github.run_id }}
          restore-keys: bot-db-

      - name: Ingest historical data
        run: |
          breakpoint init-db
          breakpoint ingest --start-year 2015

      - name: Recompute Elo
        run: breakpoint elo

      - name: Train model
        run: breakpoint train --min-year 2015

      - name: Fetch upcoming fixtures (Sofascore)
        run: breakpoint fetch-fixtures --days 5
        continue-on-error: true

      - name: Fetch live odds (The Odds API)
        env:
          BREAKPOINT_ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: breakpoint fetch-odds
        continue-on-error: true

      - name: Predict + place fake bets
        run: breakpoint predict
        continue-on-error: true

      - name: Settle open bets
        run: breakpoint settle

      - name: Export JSON for dashboard
        run: breakpoint export

      - name: Commit dashboard data
        id: commit
        run: |
          git config user.name "breakpoint-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dashboard/public/data
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: scheduled update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install + build dashboard
        working-directory: dashboard
        run: |
          npm ci || npm install
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist
      - id: deployment
        uses: actions/deploy-pages@v4
